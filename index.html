<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Reset</title>
    
    <!-- PWA Meta tags -->
    <meta name="theme-color" content="#0F5132">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark sticky-top" style="background-color: #0c4128;">
        <div class="container-fluid d-flex py-1 px-3">
            <span class="navbar-brand mb-0 h1 fw-bold font-outfit d-flex align-items-center gap-2">
                <img src="logo.png" width="32" height="32" alt="Logo" style="border-radius: 8px;">
                Life Reset
            </span>
            <button id="enableNotificationsBtn" class="btn btn-outline-light btn-sm d-flex align-items-center gap-2 position-relative">
                <i class="bi bi-bell-fill"></i>
                <span class="d-none d-sm-inline">Alerts</span>
            </button>
        </div>
    </nav>

    <div class="container pb-5 mt-4 wrapper">
        
        <!-- Header & Progress -->
        <div class="d-flex justify-content-between align-items-end border-bottom border-secondary pb-3 mb-4">
            <div>
                <h5 class="text-secondary mb-1" id="currentDateDisplay">Today</h5>
                <h2 class="fw-bold font-outfit mb-0">Daily Rituals</h2>
            </div>
            <div class="text-end">
                <h3 class="mb-0 text-emerald fw-bold" id="progressText">0%</h3>
                <small class="text-secondary">Completed</small>
            </div>
        </div>

        <!-- Task List Container -->
        <div id="taskList" class="d-flex flex-column gap-3 mb-4">
            <!-- Tasks will be rendered here dynamically -->
        </div>

        <!-- Add Task Form -->
        <div class="card bg-darker border-secondary mt-5 add-task-card">
            <div class="card-body">
                <h5 class="card-title fw-bold font-outfit mb-3">Add New Habit</h5>
                <form id="taskForm">
                    <div class="mb-3">
                        <label class="form-label text-secondary small">Task Name</label>
                        <input type="text" id="taskName" class="form-control bg-dark text-light border-secondary" placeholder="e.g. Deep Work Session" required>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label text-secondary small">Start Time</label>
                            <input type="time" id="taskStartTime" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-secondary small">Deadline</label>
                            <input type="time" id="taskEndTime" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-emerald w-100 fw-bold py-2">
                        <i class="bi bi-plus-lg me-2"></i> Add Task
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dopamine Modal (Framer Motion style) -->
    <div id="dopamineModal" class="dopamine-modal-backdrop">
        <div class="dopamine-modal-content bg-emerald text-light p-4 rounded-4 shadow-lg text-center">
            <i class="bi bi-star-fill text-warning fs-1 mb-2"></i>
            <h3 class="fw-bold font-outfit mb-2" id="dopamineTitle">Excellent Work!</h3>
            <p class="mb-0 opacity-75" id="dopamineMessage">You've completed a tough task.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
